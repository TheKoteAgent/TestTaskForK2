<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ERP System</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; }
        .section { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, button { padding: 8px; margin: 5px 0; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        .fetch-btn { background: #28a745; margin-bottom: 10px; }
        .fetch-btn:hover { background: #218838; }
        .result { color: green; font-weight: bold; font-size: 14px; }
        .error { color: red; font-weight: bold; font-size: 14px; }
        ul { list-style-type: none; padding-left: 0; }
        li { background: #f8f9fa; margin: 5px 0; padding: 8px; border-radius: 4px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <h1>Міні-ERP</h1>

    <div class="section">
        <h2>Клієнти</h2>
        <form id="clientForm">
            <input type="text" id="clientName" placeholder="Ім'я" required>
            <input type="text" id="clientPhone" placeholder="Телефон" required>
            <button type="submit">Додати клієнта</button>
        </form>
        <p id="clientResult" class="result"></p>
        <hr>
        <button class="fetch-btn" onclick="loadClients()">Показати всіх клієнтів</button>
        <ul id="clientsList"></ul>
    </div>

    <div class="section">
        <h2>Товари (Склад)</h2>
        <form id="productForm">
            <input type="text" id="productName" placeholder="Назва" required>
            <input type="number" id="productAmount" placeholder="Кількість" required>
            <input type="number" step="0.01" id="productPrice" placeholder="Ціна" required>
            <button type="submit">Додати товар</button>
        </form>
        <p id="productResult" class="result"></p>
        <hr>
        <button class="fetch-btn" onclick="loadProducts()">Показати всі товари</button>
        <ul id="productsList"></ul>
    </div>

    <div class="section">
        <h2>Замовлення</h2>
        <form id="orderForm">
            <input type="number" id="orderClientId" placeholder="ID Клієнта" required>
            <input type="number" id="orderProductId" placeholder="ID Товару" required>
            <input type="number" id="orderQuantity" placeholder="Кількість для покупки" required>
            <button type="submit">Створити замовлення</button>
        </form>
        <p id="orderResult" class="result"></p>
        <hr>
        <button class="fetch-btn" onclick="loadOrders()">Показати всі замовлення</button>
        <ul id="ordersList"></ul>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
